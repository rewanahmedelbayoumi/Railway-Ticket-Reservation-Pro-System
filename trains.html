<!DOCTYPE html>
<html>
<head>
    <title>RailElegance - Available Trains</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f0ff;
            color: #5a4a6a;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #d48a8e;
            text-align: center;
            margin-bottom: 30px;
        }
        .search-form {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #7a6b8f;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0d6eb;
            border-radius: 8px;
            font-size: 1em;
        }
        .btn {
            background-color: #d48a8e;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background-color: #c17579;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f0e6fa;
        }
        th {
            background-color: #f8f0ff;
            color: #7a6b8f;
        }
        tr:hover {
            background-color: #fdf5ff;
        }
        .book-btn {
            color: #d48a8e;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #7a6b8f;
            text-decoration: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Available Trains</h1>
        
        <div class="search-form">
            <form method="GET" action="/trains">
                <div class="form-row">
                    <div class="form-group">
                        <label>From:</label>
                        <input type="text" name="source" placeholder="Departure city">
                    </div>
                    <div class="form-group">
                        <label>To:</label>
                        <input type="text" name="destination" placeholder="Arrival city">
                    </div>
                    <div class="form-group">
                        <label>Date:</label>
                        <input type="date" name="date">
                    </div>
                </div>
                <button type="submit" class="btn">Search Trains</button>
            </form>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Train ID</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Departure Time</th>
                    <th>Seats Available</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for train in trains %}
                <tr>
                    <td>{{ train[0] }}</td>
                    <td>{{ train[1] }}</td>
                    <td>{{ train[2] }}</td>
                    <td>{{ train[3] }}</td>
                    <td>{{ train[4] }}</td>
                    <td><a href="/book/{{ train[0] }}" class="book-btn">Book Now</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        
        <a href="/dashboard" class="back-link">← Back to Dashboard</a>
    </div>
</body>
</html>
