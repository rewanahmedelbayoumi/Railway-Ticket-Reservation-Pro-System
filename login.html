<!DOCTYPE html>
<html>
<head>
    <title>RailElegance - Login</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(255, 245, 247, 0.9), rgba(255, 245, 247, 0.9)), 
                        url('https://images.unsplash.com/photo-1520523839897-bd0b52f945a0?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            color: #5a4a6a;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #d48a8e;
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Playfair Display', serif;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #7a6b8f;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0d6eb;
            border-radius: 8px;
            font-size: 1em;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #d48a8e;
            outline: none;
        }
        button {
            background-color: #d48a8e;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #c17579;
            transform: translateY(-2px);
        }
        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #7a6b8f;
        }
        .register-link a {
            color: #d48a8e;
            text-decoration: none;
            font-weight: 600;
        }
        .floral-decoration {
            text-align: center;
            margin: 20px 0;
            color: #d48a8e;
            font-size: 1.5em;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Welcome Back</h1>
        <div class="floral-decoration">✿</div>
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" required placeholder="Your email address">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" required placeholder="Your password">
            </div>
            <button type="submit">Login</button>
        </form>
        
        <div class="register-link">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
</body>
</html>
